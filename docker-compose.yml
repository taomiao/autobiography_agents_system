services:
  backend:
    build: ./backend
    ports:
      - "6986:6986"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 6986 --reload

  frontend:
    build: ./frontend
    ports:
      - "6985:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:6986/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
